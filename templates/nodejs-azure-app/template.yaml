apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-azure-app
  title: Create a Node.js web application in Azure DevOps
  description: Create a starter Node.js application and publish it to Azure DevOps
  tags:
    - nodejs
    - azure
    - azure-devops
    - express

spec:
  owner: user:guest
  type: service

  parameters:
    - title: Azure DevOps
      required:
        - orgName
        - projectName
        - repoName
      properties:
        orgName:
          title: Organization
          type: string
          description: Azure DevOps organization
          default: sua-organizacao

        projectName:
          title: Project
          type: string
          description: Azure DevOps project
          default: seu-projeto

        repoName:
          title: Repository
          type: string
          description: Repository name
          pattern: '^[a-zA-Z0-9._-]+$'

    - title: Component metadata
      required:
        - owner
        - system
      properties:
        title:
          title: Title
          type: string
          description: Component title

        description:
          title: Description
          type: string
          description: Component description

        owner:
          title: Owner
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind:
                - Group
                - User

        system:
          title: System
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind:
                - System

        port:
          title: Port
          type: number
          default: 3000

  steps:
    - id: fetch-base
      name: Generate project files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          orgName: ${{ parameters.orgName }}
          projectName: ${{ parameters.projectName }}
          repoName: ${{ parameters.repoName }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          title: ${{ parameters.title }}
          description: ${{ parameters.description }}
          port: ${{ parameters.port }}
          applicationType: website
          sourceControl: dev.azure.com

    - id: publish
      name: Publish to Azure DevOps
      action: publish:azure
      input:
        allowedHosts:
          - dev.azure.com
        repoUrl: dev.azure.com?organization=${{ parameters.orgName }}&project=${{ parameters.projectName }}&repo=${{ parameters.repoName }}
        description: ${{ parameters.description }}
        defaultBranch: main

    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        entityRef: ${{ steps.register.output.entityRef }}
